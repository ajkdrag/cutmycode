{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
    <h1>Profile</h1>
    <p>First Name: {{ user.first_name }}</p>
    <p>Last Name: {{ user.last_name }}</p>
    <p>Username: {{ user.username }}</p>
    <p>Email: {{ user.email }}</p>
    <a href="{{ user.get_edit_url }}">Edit Profile</a>
{% endblock %}
