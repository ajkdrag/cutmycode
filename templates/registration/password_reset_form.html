{% extends "base.html" %}
{% block title %}
    Password Reset
{% endblock title %}
{% block content %}
    <h2>Password Reset</h2>
    <p>Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button button--primary" type="submit">Reset Password</button>
    </form>
{% endblock content %}
