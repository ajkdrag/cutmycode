<article class="c-card | box | u-padding-xs">
    <div class="stack | u-gap-s u-min-block-sz-100">
        <header class="sidebar | u-gap-2xs">
            <div style="width: 50px;
                        height: 50px;
                        border-radius: 50%;
                        overflow: hidden">
                <svg width="50"
                     height="50"
                     viewBox="0 0 100 100"
                     fill="none"
                     xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#e0e0e0" />
                    <path d="M20 70 C 20 50, 80 50, 80 70" stroke="#9e9e9e" stroke-width="5" fill="none" />
                    <circle cx="35" cy="40" r="10" fill="#9e9e9e" />
                    <circle cx="65" cy="40" r="10" fill="#9e9e9e" />
                </svg>
            </div>
            <div class="stack | u-gap-0">
                <p>
                    <a class="c-card__title" href="{{ snippet.get_absolute_url }}">{{ snippet.title }}</a>
                </p>
                <p class="c-card__meta">by {{ snippet.user }}, {{ snippet.created_at | timesince }} ago</p>
            </div>
        </header>
        {% if snippet.description %}<p class="u-text-small">{{ snippet.description | truncatechars:30 }}</p>{% endif %}
        <section class="u-padding-xs u-bg-secondary" style="flex-grow:1;">
            <pre class="u-text-small u-pos-relative"><code>{{ snippet.code | truncatechars:100 }}</code></pre>
        </section>
        <footer class="spaced-row">
            <div class="cluster | u-gap-s">
                <button class="c-card__action" aria-label="Like post">♥</button>
                <button class="c-card__action" aria-label="Share post">↗</button>
                <button class="c-card__action" aria-label="Bookmark post">🔖</button>
            </div>
            <button class="c-button c-button--small | u-pos-relative">Read More</button>
        </footer>
    </div>
</article>
