{% extends "base.html" %}
{% block title %}{{ snippet.title }}{% endblock %}
{% block content %}
    <div class="wrapper">
        <div class="box | u-shadow">
            <div class="stack">
                <div class="stack | u-gap-2xs">
                    <h4>{{ snippet.title }}</h4>
                    <p class="u-text-small u-text-muted">Shared snippet by {{ snippet.user.username }}</p>
                </div>
                <p>{{ snippet.description }}</p>
                <section class="stack | u-gap-2xs">
                    <pre class="u-text-small | u-padding-xs u-bg-secondary"><code>{{ snippet.code }}</code></pre>
                </section>
            </div>
        </div>
    </div>
{% endblock %}
